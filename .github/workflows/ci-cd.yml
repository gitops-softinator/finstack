name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: auth-service
            path: ./services/auth-service
          - name: notification-service
            path: ./services/notification-service
          - name: payment-service
            path: ./services/payment-service
          - name: transaction-service
            path: ./services/transaction-service
          - name: user-service
            path: ./services/user-service
          - name: frontend
            path: ./frontend
          - name: gateway
            path: ./gateway

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. PATH FILTERING (Check karo sirf is service ka code badla hai kya?)
      - name: Path Filter (Detect Changes)
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - '${{ matrix.path }}/**'

      # 2. DOCKER SETUP (For Caching Engine)
      - name: Set up Docker Buildx
        if: steps.filter.outputs.src == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        if: steps.filter.outputs.src == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_EMAIL }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. BUILD, CACHE, AND PUSH (With SHA Tag)
      - name: Build & Push
        if: steps.filter.outputs.src == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.path }}
          push: true
          # Double Tagging: 'latest' aur 'Git_Commit_ID' dono bhejenge
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/finstack-${{ matrix.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/finstack-${{ matrix.name }}:${{ github.sha }}
          # Magic Code: Save Docker Layers in GitHub Cache!
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
