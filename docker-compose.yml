services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - "mongo_data:/data/db"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: unless-stopped
    expose:
      - "4000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user-service:
    build: ./services/user-service
    container_name: user-service
    restart: unless-stopped
    expose:
      - "4001"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    restart: unless-stopped
    expose:
      - "4002"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl","-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    restart: unless-stopped
    expose:
      - "4003"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
  transaction-service:
    build: ./services/transaction-service
    container_name: transaction-service
    restart: unless-stopped
    expose:
      - "4004"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  backend-net:
  frontend-net:

volumes:
  mongo_data:
