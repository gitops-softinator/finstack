global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - "alertmanager:9093"

rule_files:
  - "alert_rules.yml"

scrape_configs:

  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:3000"]

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:4000"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:4001"]

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:4002"]

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:4003"]

  - job_name: "transaction-service"
    static_configs:
      - targets: ["transaction-service:4004"]
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
