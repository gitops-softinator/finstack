apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: finstack
    namespace: finstack
  name: finstack-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finstack-auth
  template:
    metadata:
  namespace: finstack
    namespace: finstack
      labels:
        app: finstack-auth
    spec:
      containers:
      - name: finstack-auth
        image: gitopssoftinator/finstack-auth-service:1.1
        env:
        - name: MONGO_URI
          value: mongodb://finstack-mongodb-service:27017/finstack
        ports:
        - containerPort: 4000
