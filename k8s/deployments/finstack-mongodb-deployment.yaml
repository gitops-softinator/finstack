apiVersion: apps/v1
kind: Deployment
metadata:
  name: finstack-mongodb
  namespace: finstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finstack-mongodb
  template:
    metadata:
      labels:
        app: finstack-mongodb
    spec:
      containers:
      - name: finstack-mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
