apiVersion: apps/v1
kind: Deployment
metadata:
  name: finstack-notification
  namespace: finstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finstack-notification
  template:
    metadata:
      labels:
        app: finstack-notification
    spec:
      containers:
      - name: finstack-notification
        image: gitopssoftinator/finstack-notification-service:1.1
        ports:
        - containerPort: 4003
