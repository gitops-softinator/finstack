apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: finstack
    namespace: finstack
    namespace: finstack
  name: finstack-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: finstack-gateway-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finstack-frontend-service
                port:
                  number: 80
